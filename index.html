const LoginScreen = ({ t, onLogin }) => {
  const [email,setEmail] = useState('');
  const [pass,setPass] = useState('');
  const [busy,setBusy] = useState(false);
  const submit = e => { e.preventDefault(); setBusy(true); setTimeout(()=>onLogin(),900); };
  const inp = { width:'100%', padding:'12px 14px', borderRadius:10, border:`1.5px solid ${t.border}`, fontSize:15, outline:'none', background:t.bg, color:t.text, transition:'border-color .15s' };
  return (
    <div style={{ minHeight:'100%', background:t.bg, display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
      <div style={{ width:'100%', maxWidth:380 }} className="fade-in">
        <div style={{ textAlign:'center', marginBottom:36 }}>
          <div style={{ width:72, height:72, borderRadius:20, background:t.primary, margin:'0 auto 16px', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:`0 8px 24px ${t.primary}40` }}>
            <Ic n="shield" size={34} color="#fff" />
          </div>
          <h1 style={{ fontSize:22, fontWeight:700, color:t.text }}>CHS労組 Connect</h1>
          <p style={{ fontSize:13, color:t.textLight, marginTop:4 }}>中央ヘルスケア労働組合</p>
        </div>
        <form onSubmit={submit} style={{ background:t.card, borderRadius:18, padding:28, boxShadow:'0 4px 28px rgba(0,0,0,0.09)' }}>
          <div style={{ marginBottom:18 }}>
            <label style={{ display:'block', fontSize:13, fontWeight:600, color:t.textMid, marginBottom:7 }}>メールアドレス</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@chs.co.jp" style={inp}
              onFocus={e=>e.target.style.borderColor=t.primary} onBlur={e=>e.target.style.borderColor=t.border} />
          </div>
          <div style={{ marginBottom:26 }}>
            <label style={{ display:'block', fontSize:13, fontWeight:600, color:t.textMid, marginBottom:7 }}>パスワード</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" style={inp}
              onFocus={e=>e.target.style.borderColor=t.primary} onBlur={e=>e.target.style.borderColor=t.border} />
          </div>
          <button type="submit" disabled={busy} style={{ width:'100%', padding:'14px', borderRadius:11, background:t.primary, color:'#fff', border:'none', fontWeight:700, fontSize:16, cursor:'pointer', opacity:busy?.7:1, transition:'opacity .15s', boxShadow:`0 4px 16px ${t.primary}40` }}>
            {busy ? 'ログイン中…' : 'ログイン'}
          </button>
          <p style={{ textAlign:'center', fontSize:12, color:t.textLight, marginTop:18, lineHeight:1.6 }}>アカウントをお持ちでない方は<br/>管理者にお問い合わせください</p>
        </form>
      </div>
    </div>
  );
};

        <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,.5)', display:'flex', alignItems:'flex-end', zIndex:100 }} onClick={()=>setUModal(false)}>
          <div className="slide-up" style={{ background:t.card, borderRadius:'20px 20px 0 0', padding:24, width:'100%' }} onClick={e=>e.stopPropagation()}>
            <h3 style={{ fontSize:16, fontWeight:700, color:t.text, marginBottom:18 }}>組合員を追加</h3>
            <label style={{ fontSize:12, fontWeight:700, color:t.textMid, display:'block', marginBottom:6 }}>氏名</label>
            <input value={nu.name} onChange={e=>setNu({...nu,name:e.target.value})} placeholder="山田 太郎" style={inp} />
            <label style={{ fontSize:12, fontWeight:700, color:t.textMid, display:'block', marginBottom:6 }}>メールアドレス</label>
            <input value={nu.email} onChange={e=>setNu({...nu,email:e.target.value})} placeholder="yamada@chs.co.jp" style={inp} />
            <label style={{ fontSize:12, fontWeight:700, color:t.textMid, display:'block', marginBottom:6 }}>役割</label>
            <select value={nu.role} onChange={e=>setNu({...nu,role:e.target.value})} style={{ ...inp, background:'#fff', marginBottom:20 }}>
              {['一般組合員','分会長','執行委員','書記長','執行委員長'].map(r=><option key={r}>{r}</option>)}
            </select>
            <div style={{ display:'flex', gap:10 }}>
              <button onClick={()=>setUModal(false)} style={{ flex:1, padding:13, borderRadius:10, border:`1.5px solid ${t.border}`, background:'#fff', color:t.textMid, fontWeight:600, cursor:'pointer' }}>キャンセル</button>
              <button onClick={addUser} style={{ flex:2, padding:13, borderRadius:10, border:'none', background:t.primary, color:'#fff', fontWeight:700, cursor:'pointer' }}>追加する</button>
            </div>
          </div>
        </div>
      )}
      {/* New Notice Modal */}
      {nModal && (
        <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,.5)', display:'flex', alignItems:'flex-end', zIndex:100 }} onClick={()=>setNModal(false)}>
          <div className="slide-up" style={{ background:t.card, borderRadius:'20px 20px 0 0', padding:24, width:'100%' }} onClick={e=>e.stopPropagation()}>
            <h3 style={{ fontSize:16, fontWeight:700, color:t.text, marginBottom:18 }}>お知らせを投稿</h3>
            <label style={{ fontSize:12, fontWeight:700, color:t.textMid, display:'block', marginBottom:8 }}>種類</label>
            <div style={{ display:'flex', gap:8, marginBottom:16 }}>
              {[['text','テキスト'],['pdf','PDF']].map(([ty,lb])=>(
                <button key={ty} onClick={()=>setNn({...nn,type:ty})} style={{ padding:'7px 16px', borderRadius:20, border:`1.5px solid ${nn.type===ty?t.primary:t.border}`, background:nn.type===ty?t.primaryLight:'#fff', color:nn.type===ty?t.primary:t.textMid, fontWeight:500, fontSize:13, cursor:'pointer' }}>{lb}</button>
              ))}
            </div>
            <label style={{ fontSize:12, fontWeight:700, color:t.textMid, display:'block', marginBottom:6 }}>タイトル</label>
            <input value={nn.title} onChange={e=>setNn({...nn,title:e.target.value})} placeholder="お知らせのタイトル" style={inp} />
            <label style={{ fontSize:12, fontWeight:700, color:t.textMid, display:'block', marginBottom:6 }}>{nn.type==='pdf'?'説明文':'本文'}</label>
            <textarea value={nn.content} onChange={e=>setNn({...nn,content:e.target.value})} placeholder="内容を入力してください" rows={3} style={{ ...inp, resize:'vertical' }} />
            {nn.type==='pdf' && (
              <div style={{ background:t.primaryLight, borderRadius:10, padding:14, border:`1.5px dashed ${t.border}`, textAlign:'center', color:t.textMid, fontSize:13, cursor:'pointer', marginBottom:14 }}>
                <Ic n="upload" size={20} color={t.primary} style={{ marginBottom:6, display:'block', margin:'0 auto 6px' }} />
                クリックしてPDFをアップロード
              </div>
            )}
            <div style={{ display:'flex', gap:10 }}>
              <button onClick={()=>setNModal(false)} style={{ flex:1, padding:13, borderRadius:10, border:`1.5px solid ${t.border}`, background:'#fff', color:t.textMid, fontWeight:600, cursor:'pointer' }}>キャンセル</button>
              <button onClick={postNotice} style={{ flex:2, padding:13, borderRadius:10, border:'none', background:t.primary, color:'#fff', fontWeight:700, cursor:'pointer' }}>投稿する</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── PROFILE SCREEN ────────────────────────────────────────────
const ProfileScreen = ({ t, role, onLogout }) => {
  const roleLabel = role==='admin'?'管理者':role==='exec'?'執行部':'一般組合員';
  return (
    <div style={{ height:'100%', overflowY:'auto', padding:'16px' }} className="fade-in">
      <Card style={{ textAlign:'center', padding:28, borderRadius:18 }}>
        <Av name="伊" size={64} bg={t.primary} />
        <h2 style={{ fontSize:18, fontWeight:700, color:t.text, marginTop:14 }}>伊藤 大輔</h2>
        <p style={{ fontSize:13, color:t.primary, fontWeight:600, marginTop:4 }}>{roleLabel}</p>
        <p style={{ fontSize:13, color:t.textLight }}>第2工場 分会</p>
        <p style={{ fontSize:12, color:t.textLight, marginTop:4 }}>ito@chs.co.jp</p>
        <p style={{ fontSize:11, color:t.textLight, marginTop:2 }}>2025年4月 入組</p>
      </Card>
      {[['bell','通知設定'],['lock','パスワード変更'],['edit','プロフィール編集']].map(([ic,lb])=>(
        <Card key={lb} style={{ display:'flex', alignItems:'center', gap:12, cursor:'pointer', borderRadius:12 }}>
          <div style={{ background:t.primaryLight, borderRadius:9, padding:9 }}><Ic n={ic} size={18} color={t.primary} /></div>
          <span style={{ flex:1, fontWeight:500, color:t.text, fontSize:14 }}>{lb}</span>
          <Ic n="chR" size={15} color={t.textLight} />
        </Card>
      ))}
      <Card onClick={onLogout} style={{ display:'flex', alignItems:'center', gap:12, cursor:'pointer', background:'#FFF2F2', border:'1.5px solid #FFD5D5', borderRadius:12 }}>
        <div style={{ background:'#FFE5E5', borderRadius:9, padding:9 }}><Ic n="logout" size={18} color="#e74c3c" /></div>
        <span style={{ fontWeight:500, color:'#e74c3c', fontSize:14 }}>ログアウト</span>
      </Card>
    </div>
  );
};

// ── MAIN APP ──────────────────────────────────────────────────
const navItems = role => {
  const base = [
    { id:'home',    label:'ホーム',   icon:'home' },
    { id:'notices', label:'お知らせ', icon:'bell', badge:3 },
    { id:'board',   label:'掲示板',   icon:'msg' },
    { id:'anon',    label:'相談室',   icon:'lock' },
    { id:'profile', label:'マイページ',icon:'user' },
  ];
  if (role==='exec'||role==='admin') base.push({ id:'admin', label:'管理', icon:'gear' });
  return base;
};

const App = () => {
  const saved = JSON.parse(localStorage.getItem('chs-state')||'{}');
  const [tweaks,setTweaks] = useState({...TWEAK_DEFAULTS,...(saved.tweaks||{})});
  const [tweaksOpen,setTweaksOpen] = useState(false);
  const [loggedIn,setLoggedIn] = useState(saved.loggedIn||false);
  const [screen,setScreen] = useState(saved.screen||'home');
  const [data,setData] = useState(null);
  const [notices,setNotices] = useState(INIT_NOTICES);
  const [isDesktop,setIsDesktop] = useState(window.innerWidth>=768);

  useEffect(()=>{ const h=()=>setIsDesktop(window.innerWidth>=768); window.addEventListener('resize',h); return()=>window.removeEventListener('resize',h); },[]);

  useEffect(()=>{ localStorage.setItem('chs-state',JSON.stringify({tweaks,loggedIn,screen})); },[tweaks,loggedIn,screen]);

  useEffect(()=>{
    const h = e => {
      if (e.data?.type==='__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type==='__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  const upTweak = (k,v) => {
    const next={...tweaks,[k]:v};
    setTweaks(next);
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:next},'*');
  };

  const t = THEMES[tweaks.theme];
  const role = tweaks.role;
  const nav = navItems(role);

  const go = (sc,d=null) => { setScreen(sc); setData(d); };

  const isBack = ['noticeDetail','thread'].includes(screen);
  const backTo = screen==='noticeDetail'?'notices':'board';
  const headerTitle = () => {
    if (screen==='home') return 'CHS労組 Connect';
    if (screen==='notices') return 'お知らせ';
    if (screen==='noticeDetail') return data?.title||'お知らせ詳細';
    if (screen==='board') return '掲示板';
    if (screen==='thread') return data?.title||'スレッド';
    if (screen==='anon') return '匿名相談室';
    if (screen==='admin') return '管理';
    if (screen==='profile') return 'マイページ';
    return '';
  };

  if (!loggedIn) return <LoginScreen t={t} onLogin={()=>setLoggedIn(true)} />;

  const renderScreen = () => {
    if (screen==='home')        return <HomeScreen t={t} notices={notices} onNav={go} />;
    if (screen==='notices')     return <NoticesScreen t={t} notices={notices} onNav={go} />;
    if (screen==='noticeDetail') return <NoticeDetailScreen t={t} notice={data} />;
    if (screen==='board')       return <BoardScreen t={t} role={role} onNav={go} />;
    if (screen==='thread')      return <ThreadScreen t={t} thread={data} />;
    if (screen==='anon')        return <AnonScreen t={t} />;
    if (screen==='admin')       return <AdminScreen t={t} notices={notices} onNoticeAdd={n=>setNotices([n,...notices])} />;
    if (screen==='profile')     return <ProfileScreen t={t} role={role} onLogout={()=>setLoggedIn(false)} />;
  };

  const activeFor = id => screen===id || (screen==='noticeDetail'&&id==='notices') || (screen==='thread'&&id==='board');

  return (
    <div style={{ height:'100%', display:'flex', background:t.bg, fontFamily:"'Noto Sans JP',sans-serif" }}>
      {/* ── Desktop sidebar ── */}
      {isDesktop && (
        <div style={{ width:220, background:t.navBg, display:'flex', flexDirection:'column', flexShrink:0 }}>
          <div style={{ padding:'24px 20px 18px', borderBottom:'1px solid rgba(255,255,255,.12)' }}>
            <div style={{ width:38, height:38, borderRadius:10, background:'rgba(255,255,255,.2)', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:12 }}>
              <Ic n="shield" size={20} color="#fff" />
            </div>
            <h1 style={{ color:'#fff', fontSize:15, fontWeight:700, lineHeight:1.3 }}>CHS労組<br/>Connect</h1>
            <p style={{ color:'rgba(255,255,255,.5)', fontSize:10, marginTop:4 }}>中央ヘルスケア労働組合</p>
          </div>
          <nav style={{ flex:1, padding:'10px 0' }}>
            {nav.map(item=>(
              <button key={item.id} onClick={()=>go(item.id)} style={{ width:'100%', display:'flex', alignItems:'center', gap:11, padding:'11px 20px', border:'none', background:activeFor(item.id)?'rgba(255,255,255,.15)':'none', color:'#fff', fontSize:13, fontWeight:activeFor(item.id)?700:400, cursor:'pointer', borderLeft:activeFor(item.id)?'3px solid #fff':'3px solid transparent', transition:'all .15s' }}>
                <Ic n={item.icon} size={17} color="#fff" />
                <span style={{ flex:1 }}>{item.label}</span>
                {item.badge && <span style={{ background:t.accent, color:'#fff', borderRadius:20, padding:'1px 7px', fontSize:10, fontWeight:700 }}>{item.badge}</span>}
              </button>
            ))}
          </nav>
          <div style={{ padding:'14px 20px', borderTop:'1px solid rgba(255,255,255,.12)', display:'flex', gap:10, alignItems:'center' }}>
            <Av name="伊" size={30} bg="rgba(255,255,255,.25)" />
            <div style={{ flex:1, minWidth:0 }}>
              <p style={{ color:'#fff', fontSize:12, fontWeight:600, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>伊藤 大輔</p>
              <p style={{ color:'rgba(255,255,255,.5)', fontSize:10 }}>{role==='admin'?'管理者':role==='exec'?'執行部':'一般組合員'}</p>
            </div>
          </div>
        </div>
      )}

      {/* ── Main area ── */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
        {/* Header */}
        <div style={{ height:54, background:t.card, borderBottom:`1px solid ${t.border}`, display:'flex', alignItems:'center', gap:10, padding:'0 16px', flexShrink:0 }}>
          {isBack ? (
            <button onClick={()=>go(backTo)} style={{ background:'none', border:'none', cursor:'pointer', display:'flex', padding:4, color:t.primary }}>
              <Ic n="chL" size={22} color={t.primary} />
            </button>
          ) : !isDesktop && (
            <div style={{ width:30, height:30, borderRadius:8, background:t.primary, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <Ic n="shield" size={16} color="#fff" />
            </div>
          )}
          <h2 style={{ flex:1, fontSize:15, fontWeight:700, color:t.text, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
            {isDesktop ? headerTitle() : (isBack ? headerTitle() : 'CHS労組 Connect')}
          </h2>
          {!isBack && (
            <div style={{ position:'relative', cursor:'pointer' }}>
              <Ic n="bell" size={22} color={t.textMid} />
              <span style={{ position:'absolute', top:-3, right:-3, width:15, height:15, borderRadius:'50%', background:t.accent, color:'#fff', fontSize:9, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center' }}>3</span>
            </div>
          )}
        </div>

        {/* Screen */}
        <div style={{ flex:1, overflow:'hidden' }}>{renderScreen()}</div>

        {/* Mobile bottom nav */}
        {!isDesktop && (
          <div style={{ background:t.card, borderTop:`1px solid ${t.border}`, display:'flex', flexShrink:0 }}>
            {nav.map(item=>(
              <button key={item.id} onClick={()=>go(item.id)} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:3, padding:'9px 2px 11px', border:'none', background:'none', cursor:'pointer', color:activeFor(item.id)?t.primary:t.textLight, position:'relative' }}>
                <Ic n={item.icon} size={20} color={activeFor(item.id)?t.primary:t.textLight} />
                <span style={{ fontSize:9.5, fontWeight:activeFor(item.id)?700:400 }}>{item.label}</span>
                {item.badge && <span style={{ position:'absolute', top:6, right:'calc(50% - 14px)', width:14, height:14, borderRadius:'50%', background:t.accent, color:'#fff', fontSize:8, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center' }}>{item.badge}</span>}
              </button>
            ))}
          </div>
        )}
      </div>

      {/* ── Tweaks ── */}
      <div className={`tweak-panel ${tweaksOpen?'open':''}`} style={{ fontFamily:"'Noto Sans JP',sans-serif" }}>
        <div style={{ fontSize:14, fontWeight:700, color:'#222', marginBottom:4 }}>Tweaks</div>
        <div className="tweak-section">テーマカラー</div>
        <div className="tweak-row">
          {Object.entries(THEMES).map(([k,th])=>(
            <button key={k} className={`tweak-chip ${tweaks.theme===k?'on':''}`}
              style={{ color:th.primary, borderColor:tweaks.theme===k?th.primary:'#e0e0e0', background:tweaks.theme===k?th.primaryLight:'#fff' }}
              onClick={()=>upTweak('theme',k)}>{th.name}</button>
          ))}
        </div>
        <div className="tweak-section">表示ロール（デモ用）</div>
        <div className="tweak-row">
          {[['member','一般組合員'],['exec','執行部'],['admin','管理者']].map(([k,lb])=>(
            <button key={k} className={`tweak-chip ${tweaks.role===k?'on':''}`}
              style={{ color:'#444', borderColor:tweaks.role===k?'#444':'#e0e0e0', background:tweaks.role===k?'#f0f0f0':'#fff' }}
              onClick={()=>upTweak('role',k)}>{lb}</button>
          ))}
        </div>
        <p style={{ fontSize:10, color:'#aaa', marginTop:12, lineHeight:1.5 }}>ロールを「執行部」または「管理者」にすると「管理」タブが表示されます</p>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
